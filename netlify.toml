  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53bHltZmZ4Ymxrbmp6bHp3eGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMzNDc5ODQsImV4cCI6MjA3ODkyMzk4NH0.Yot9wKDTaZyqy9Rrl0yjLyEjblPft0KCvy290BYYjng"
  RESEND_API_KEY = "re_SR1Pg6vg_MCMTqhA1orqwhUJCxDYEARD9"
  NEXT_PUBLIC_SITE_URL = "https://financial-folks.bolt.host"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Handle SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200